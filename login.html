<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng nhập/Đăng ký ArtGallery - Triển lãm nghệ thuật trực tuyến">
    <title>Đăng Nhập / Đăng Ký — ArtGallery</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Auth Page Specific Styles */
        body.auth-page {
            background: linear-gradient(135deg, #faf8f5 0%, #f0ece6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-container {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(44,24,16,0.15);
            padding: 3rem 2rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(139,94,60,0.08);
        }

        @media(max-width: 575.98px) {
            .auth-container {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #8b5e3c, #7c3a6b);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.8rem;
            margin: 0 auto 1rem;
        }

        .auth-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c1810;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: #a09585;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            font-weight: 600;
            color: #2c1810;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border: 1.5px solid #e8e2da;
            border-radius: 10px;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #faf8f5;
        }

        .form-control:focus {
            background: #ffffff;
            border-color: #c4956a;
            box-shadow: 0 0 0 3px rgba(196, 149, 106, 0.1);
        }

        .form-control::placeholder {
            color: #a09585;
        }

        .btn-auth {
            width: 100%;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }

        .btn-auth-primary {
            background: linear-gradient(135deg, #8b5e3c, #6b4226);
            color: #fff;
        }

        .btn-auth-primary:hover {
            background: linear-gradient(135deg, #6b4226, #5a3620);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139,94,60,0.25);
            color: #fff;
        }

        .btn-auth-secondary {
            background: #f0f0f0;
            color: #2c1810;
            border: 1.5px solid #e8e2da;
            margin-top: 0;
        }

        .btn-auth-secondary:hover {
            background: #e8e2da;
            color: #2c1810;
        }

        .auth-divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e8e2da;
        }

        .auth-divider span {
            background: #fff;
            padding: 0 1rem;
            color: #a09585;
            font-size: 0.85rem;
            position: relative;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f0ece6;
        }

        .auth-footer p {
            color: #6b5d52;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #8b5e3c;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: #6b4226;
        }

        .alert-error {
            background: rgba(220,38,38,0.05);
            border: 1.5px solid rgba(220,38,38,0.2);
            color: #b91c1c;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .alert-error.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        .alert-success {
            background: rgba(22,163,74,0.05);
            border: 1.5px solid rgba(22,163,74,0.2);
            color: #166534;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .alert-success.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toggle-form {
            display: none;
        }

        .toggle-form.active {
            display: block;
        }

        .input-group-text {
            background: #faf8f5;
            border: 1.5px solid #e8e2da;
            border-right: none;
            color: #a09585;
        }

        .form-control.with-icon {
            border-left: none;
        }

        .form-control.with-icon:focus {
            border-left: none;
        }

        .input-group-text:focus-within {
            border-color: #c4956a;
        }

        .btn-toggle-password {
            background: none;
            border: none;
            color: #a09585;
            cursor: pointer;
            padding: 0 0.5rem;
        }

        .btn-toggle-password:hover {
            color: #8b5e3c;
        }

        .icon-accent {
            color: #c4956a;
        }
    </style>
</head>
<body class="auth-page">

    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <div class="auth-logo">
                <i class="bi bi-palette2"></i>
            </div>
            <h2 id="form-title">Đăng Nhập</h2>
            <p id="form-subtitle">Chào mừng quay lại ArtGallery</p>
        </div>

        <!-- Alerts -->
        <div id="alert-error" class="alert-error" role="alert">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span id="alert-error-text"></span>
        </div>
        <div id="alert-success" class="alert-success" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span id="alert-success-text"></span>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="toggle-form active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-email" class="form-label">
                    <i class="bi bi-envelope me-1 icon-accent"></i> Email
                </label>
                <input type="email" class="form-control" id="login-email" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label for="login-password" class="form-label">
                    <i class="bi bi-lock me-1 icon-accent"></i> Mật khẩu
                </label>
                <div class="input-group">
                    <input type="password" class="form-control with-icon" id="login-password" placeholder="Nhập mật khẩu" required>
                    <button class="btn-toggle-password" type="button" id="toggle-login-password" title="Hiện/ẩn mật khẩu">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-auth btn-auth-primary">
                <i class="bi bi-box-arrow-in-right me-2"></i> Đăng Nhập
            </button>

            <div class="auth-divider">
                <span>Hoặc</span>
            </div>

            <button type="button" class="btn btn-auth btn-auth-secondary" onclick="toggleForm()">
                <i class="bi bi-person-plus me-2"></i> Tạo tài khoản mới
            </button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="toggle-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="register-name" class="form-label">
                    <i class="bi bi-person me-1 icon-accent"></i> Họ và tên
                </label>
                <input type="text" class="form-control" id="register-name" placeholder="Nhập tên đầy đủ" required>
            </div>

            <div class="form-group">
                <label for="register-email" class="form-label">
                    <i class="bi bi-envelope me-1 icon-accent"></i> Email
                </label>
                <input type="email" class="form-control" id="register-email" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label for="register-password" class="form-label">
                    <i class="bi bi-lock me-1 icon-accent"></i> Mật khẩu
                </label>
                <div class="input-group">
                    <input type="password" class="form-control with-icon" id="register-password" placeholder="Ít nhất 6 ký tự" required>
                    <button class="btn-toggle-password" type="button" id="toggle-register-password" title="Hiện/ẩn mật khẩu">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="register-confirm" class="form-label">
                    <i class="bi bi-lock-check me-1 icon-accent"></i> Xác nhận mật khẩu
                </label>
                <div class="input-group">
                    <input type="password" class="form-control with-icon" id="register-confirm" placeholder="Xác nhận mật khẩu" required>
                    <button class="btn-toggle-password" type="button" id="toggle-register-confirm" title="Hiện/ẩn mật khẩu">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-auth btn-auth-primary">
                <i class="bi bi-person-check me-2"></i> Đăng Ký
            </button>

            <div class="auth-divider">
                <span>Hoặc</span>
            </div>

            <button type="button" class="btn btn-auth btn-auth-secondary" onclick="toggleForm()">
                <i class="bi bi-arrow-left me-2"></i> Quay lại đăng nhập
            </button>
        </form>

        <!-- Footer -->
        <div class="auth-footer">
            <p>
                Là quản trị viên? 
                <a href="admin-login.html"><strong>Đăng nhập tại đây</strong></a>
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="auth.js"></script>
    <script>
        // Toggle between login and register forms
        function toggleForm() {
            document.getElementById('login-form').classList.toggle('active');
            document.getElementById('register-form').classList.toggle('active');
            
            if (document.getElementById('login-form').classList.contains('active')) {
                document.getElementById('form-title').textContent = 'Đăng Nhập';
                document.getElementById('form-subtitle').textContent = 'Chào mừng quay lại ArtGallery';
            } else {
                document.getElementById('form-title').textContent = 'Đăng Ký';
                document.getElementById('form-subtitle').textContent = 'Tạo tài khoản mới';
            }
            
            clearAlerts();
        }

        // Toggle password visibility
        function setupPasswordToggle(toggleBtn, inputField) {
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function() {
                    const isPassword = inputField.type === 'password';
                    inputField.type = isPassword ? 'text' : 'password';
                    toggleBtn.innerHTML = `<i class="bi bi-${isPassword ? 'eye-slash' : 'eye'}"></i>`;
                });
            }
        }

        // Setup password toggles
        setupPasswordToggle(
            document.getElementById('toggle-login-password'),
            document.getElementById('login-password')
        );
        setupPasswordToggle(
            document.getElementById('toggle-register-password'),
            document.getElementById('register-password')
        );
        setupPasswordToggle(
            document.getElementById('toggle-register-confirm'),
            document.getElementById('register-confirm')
        );

        // Show alert
        function showAlert(type, message) {
            const errorAlert = document.getElementById('alert-error');
            const successAlert = document.getElementById('alert-success');
            
            if (type === 'error') {
                document.getElementById('alert-error-text').textContent = message;
                errorAlert.classList.add('show');
                successAlert.classList.remove('show');
            } else if (type === 'success') {
                document.getElementById('alert-success-text').textContent = message;
                successAlert.classList.add('show');
                errorAlert.classList.remove('show');
            }
        }

        // Clear alerts
        function clearAlerts() {
            document.getElementById('alert-error').classList.remove('show');
            document.getElementById('alert-success').classList.remove('show');
        }

        // Handle login
        function handleLogin(e) {
            e.preventDefault();
            clearAlerts();

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showAlert('error', 'Vui lòng điền đầy đủ thông tin');
                return;
            }

            const result = auth.loginUser(email, password);
            
            if (result.success) {
                showAlert('success', result.message);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showAlert('error', result.message);
            }
        }

        // Handle register
        function handleRegister(e) {
            e.preventDefault();
            clearAlerts();

            const fullName = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;

            if (!fullName || !email || !password || !confirm) {
                showAlert('error', 'Vui lòng điền đầy đủ thông tin');
                return;
            }

            if (password !== confirm) {
                showAlert('error', 'Mật khẩu xác nhận không khớp');
                return;
            }

            const result = auth.registerUser(email, password, fullName);
            
            if (result.success) {
                showAlert('success', result.message);
                
                // Clear form
                document.getElementById('register-form').reset();
                
                // Switch to login form after 1.5 seconds
                setTimeout(() => {
                    toggleForm();
                }, 1500);
            } else {
                showAlert('error', result.message);
            }
        }

        // Check if already logged in
        window.addEventListener('load', function() {
            if (auth.isUserLoggedIn()) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
