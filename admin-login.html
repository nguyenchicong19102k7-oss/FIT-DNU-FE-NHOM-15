<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login - ArtGallery Admin Panel">
    <title>Admin Login — ArtGallery</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Admin Auth Page */
        body.admin-auth-page {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .admin-auth-container {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 3rem 2rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid #e5e7eb;
        }

        @media(max-width: 575.98px) {
            .admin-auth-container {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }
        }

        .admin-auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .admin-auth-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2rem;
            margin: 0 auto 1rem;
        }

        .admin-auth-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e1b2e;
            margin-bottom: 0.5rem;
        }

        .admin-auth-header p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .admin-auth-header .badge {
            background: #fef3c7;
            color: #92400e;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 1rem;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            font-weight: 600;
            color: #1e1b2e;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-control:focus {
            background: #ffffff;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .form-control::placeholder {
            color: #9ca3af;
        }

        .btn-admin-auth {
            width: 100%;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }

        .btn-admin-login {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
        }

        .btn-admin-login:hover {
            background: linear-gradient(135deg, #6d28d9, #5b21b6);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124,58,237,0.3);
            color: #fff;
        }

        .btn-admin-back {
            background: #f3f4f6;
            color: #1e1b2e;
            border: 1.5px solid #e5e7eb;
            margin-top: 0;
        }

        .btn-admin-back:hover {
            background: #e5e7eb;
            color: #1e1b2e;
        }

        .admin-auth-divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }

        .admin-auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
        }

        .admin-auth-divider span {
            background: #fff;
            padding: 0 1rem;
            color: #9ca3af;
            font-size: 0.85rem;
            position: relative;
        }

        .admin-auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f3f4f6;
        }

        .admin-auth-footer p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .admin-auth-footer a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .admin-auth-footer a:hover {
            color: #6d28d9;
        }

        .alert-error {
            background: rgba(220,38,38,0.05);
            border: 1.5px solid rgba(220,38,38,0.2);
            color: #b91c1c;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .alert-error.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        .alert-success {
            background: rgba(22,163,74,0.05);
            border: 1.5px solid rgba(22,163,74,0.2);
            color: #166534;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .alert-success.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-toggle-password {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0 0.5rem;
        }

        .btn-toggle-password:hover {
            color: #7c3aed;
        }

        .input-group-text {
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-right: none;
            color: #9ca3af;
        }

        .form-control.with-icon {
            border-left: none;
        }

        .form-control.with-icon:focus {
            border-left: none;
        }

        .demo-credentials {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #92400e;
        }

        .demo-credentials strong {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .demo-credentials .cred {
            margin: 0.25rem 0;
        }

        .icon-admin-accent {
            color: #7c3aed;
        }
    </style>
</head>
<body class="admin-auth-page">

    <div class="admin-auth-container">
        <!-- Header -->
        <div class="admin-auth-header">
            <div class="admin-auth-logo">
                <i class="bi bi-shield-check"></i>
            </div>
            <h2>Admin Panel</h2>
            <p>Đăng nhập để quản lý tác phẩm</p>
            <span class="badge"><i class="bi bi-lock-fill me-1"></i> Khu vực riêng</span>
        </div>

        <!-- Alerts -->
        <div id="alert-error" class="alert-error" role="alert">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span id="alert-error-text"></span>
        </div>
        <div id="alert-success" class="alert-success" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span id="alert-success-text"></span>
        </div>

        <!-- Login Form -->
        <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
            <div class="form-group">
                <label for="admin-username" class="form-label">
                    <i class="bi bi-person me-1 icon-admin-accent"></i> Tên đăng nhập
                </label>
                <input type="text" class="form-control" id="admin-username" placeholder="Nhập tên đăng nhập" required>
            </div>

            <div class="form-group">
                <label for="admin-password" class="form-label">
                    <i class="bi bi-lock me-1 icon-admin-accent"></i> Mật khẩu
                </label>
                <div class="input-group">
                    <input type="password" class="form-control with-icon" id="admin-password" placeholder="Nhập mật khẩu" required>
                    <button class="btn-toggle-password" type="button" id="toggle-admin-password" title="Hiện/ẩn mật khẩu">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-admin-auth btn-admin-login">
                <i class="bi bi-box-arrow-in-right me-2"></i> Đăng Nhập Admin
            </button>

            <div class="admin-auth-divider">
                <span>Hoặc</span>
            </div>

            <button type="button" class="btn btn-admin-auth btn-admin-back" onclick="window.location.href='index.html'">
                <i class="bi bi-arrow-left me-2"></i> Quay lại trang chủ
            </button>
        </form>

        <!-- Footer -->
        <div class="admin-auth-footer">
            <p>
                Người dùng bình thường?
                <a href="login.html"><strong>Đăng nhập tại đây</strong></a>
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="auth.js"></script>
    <script>
        // Toggle password visibility
        function setupPasswordToggle(toggleBtn, inputField) {
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function() {
                    const isPassword = inputField.type === 'password';
                    inputField.type = isPassword ? 'text' : 'password';
                    toggleBtn.innerHTML = `<i class="bi bi-${isPassword ? 'eye-slash' : 'eye'}"></i>`;
                });
            }
        }

        // Setup password toggle
        setupPasswordToggle(
            document.getElementById('toggle-admin-password'),
            document.getElementById('admin-password')
        );

        // Show alert
        function showAlert(type, message) {
            const errorAlert = document.getElementById('alert-error');
            const successAlert = document.getElementById('alert-success');
            
            if (type === 'error') {
                document.getElementById('alert-error-text').textContent = message;
                errorAlert.classList.add('show');
                successAlert.classList.remove('show');
            } else if (type === 'success') {
                document.getElementById('alert-success-text').textContent = message;
                successAlert.classList.add('show');
                errorAlert.classList.remove('show');
            }
        }

        // Clear alerts
        function clearAlerts() {
            document.getElementById('alert-error').classList.remove('show');
            document.getElementById('alert-success').classList.remove('show');
        }

        // Handle admin login
        function handleAdminLogin(e) {
            e.preventDefault();
            clearAlerts();

            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;

            if (!username || !password) {
                showAlert('error', 'Vui lòng điền đầy đủ thông tin');
                return;
            }

            const result = auth.loginAdmin(username, password);
            
            if (result.success) {
                showAlert('success', result.message);
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                showAlert('error', result.message);
            }
        }

        // Check if already logged in as admin
        window.addEventListener('load', function() {
            if (auth.isAdminLoggedIn()) {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
